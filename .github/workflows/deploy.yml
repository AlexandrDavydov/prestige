name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: aleksander75/prestige-app
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e  # Остановка при ошибке
            
            # Скачиваем новый образ
            docker pull aleksander75/prestige-app:latest
            
            # Создаем бэкап старого контейнера
            docker rename prestige-app prestige-app-old || true
            
            # Запускаем новый контейнер
            docker run -d \
              --name prestige-app \
              -p 80:5000 \
              -v /var/lib/prestige/instance:/app/instance \
              --restart always \
              aleksander75/prestige-app:latest
            
            # Ждем 10 секунд для инициализации
            sleep 10
            
            # Проверяем, что контейнер работает
            if docker ps | grep -q prestige-app; then
              echo "✅ Deployment successful!"
              docker rm prestige-app-old || true
            else
              echo "❌ Deployment failed! Rolling back..."
              # Откатываемся
              docker stop prestige-app || true
              docker rm prestige-app || true
              docker rename prestige-app-old prestige-app
              docker start prestige-app
              exit 1
            fi