name: CI/CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout E2E tests
        uses: actions/checkout@v4
        with:
          repository: AlexandrDavydov/prestige_test_java
          ref: ci_cd_integration
          path: tests
          token: ${{ secrets.GH_PAT }}

      - name: Build app Docker image
        run: docker build -t prestige-app ./app

      - name: Start app container
        run: |
          mkdir -p ${{ github.workspace }}/instance
          chmod 777 ${{ github.workspace }}/instance
          docker run -d --name app \
            -p 5000:5000 \
            -v ${{ github.workspace }}/instance:/app/instance \
            prestige-app
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:5000
          docker exec app chmod 666 /app/instance/db.db
          ls -la ${{ github.workspace }}/instance/
          docker logs app

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: tests/pom.xml

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/pom.xml') }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: |
          cd tests
          mvn test \
            -Dbase.url=http://localhost:5000 \
            -Dheadless=true \
            -Ddb.url=jdbc:sqlite:${{ github.workspace }}/instance/db.db \
            -Dapp.username="${{ secrets.APP_USERNAME }}" \
            -Dapp.password="${{ secrets.APP_PASSWORD }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: tests/target/surefire-reports/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-allure-results
          path: tests/target/allure-results/

      - name: Load existing reports from gh-pages
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: AlexandrDavydov/prestige_test_java
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GH_PAT }}

      - name: Prepare Allure history
        if: always()
        run: |
          LATEST_REPORT=$(ls -d gh-pages/reports/*/ 2>/dev/null | sort -r | head -1)
          if [ -n "$LATEST_REPORT" ] && [ -d "${LATEST_REPORT}history" ]; then
            mkdir -p tests/target/allure-results/history
            cp -r "${LATEST_REPORT}history"/* tests/target/allure-results/history/ 2>/dev/null || true
          fi

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          mkdir -p tests/target/allure-report/reports
          allure generate tests/target/allure-results -o "tests/target/allure-report/reports/$TIMESTAMP" --clean

      - name: Combine reports and keep last 20
        if: always()
        run: |
          REPORTS_DIR="tests/target/allure-report/reports"

          # Copy existing reports from gh-pages
          if [ -d gh-pages/reports ]; then
            cp -r gh-pages/reports/* "$REPORTS_DIR/" 2>/dev/null || true
          fi

          # Keep only last 20 reports
          cd "$REPORTS_DIR"
          ls -1 | sort -r | tail -n +21 | xargs -r rm -rf
          cd ../../../..

          cat > tests/target/allure-report/index.html << 'REPORTINDEX'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Allure Reports</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
              h1 { color: #333; }
              table { width: 100%; border-collapse: collapse; }
              th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
              th { background-color: #f5f5f5; }
              tr:hover { background-color: #f9f9f9; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .latest-badge { background: #28a745; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
            </style>
          </head>
          <body>
            <h1>Allure Test Reports</h1>
            <table>
              <tr><th>Report</th><th>Date</th></tr>
          REPORTINDEX

          for report in $(ls -1 "$REPORTS_DIR" | sort -r); do
            TIMESTAMP="${report#reports/}"
            DATE_PART="${TIMESTAMP:0:8}"
            TIME_PART="${TIMESTAMP:9:2}:${TIMESTAMP:11:2}:${TIMESTAMP:13:2}"
            FORMATTED_DATE="${DATE_PART:0:4}-${DATE_PART:4:2}-${DATE_PART:6:2} $TIME_PART"
            LATEST_TAG=""
            if [ "$report" = "$(ls -1 "$REPORTS_DIR" | sort -r | head -1)" ]; then
              LATEST_TAG=' <span class="latest-badge">latest</span>'
            fi
            echo "              <tr><td><a href=\"reports/$report/index.html\">$report</a>$LATEST_TAG</td><td>$FORMATTED_DATE</td></tr>" >> tests/target/allure-report/index.html
          done

          cat >> tests/target/allure-report/index.html << 'REPORTINDEXCLOSE'
            </table>
          </body>
          </html>
          REPORTINDEXCLOSE

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: AlexandrDavydov/prestige_test_java
          publish_branch: gh-pages
          publish_dir: tests/target/allure-report
          personal_token: ${{ secrets.GH_PAT }}

  build-and-deploy:
    needs: e2e-tests  # <-- деплой только при успешных тестах
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: image=moby/buildkit:latest
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            aleksander75/prestige-app:latest
            aleksander75/prestige-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            docker stop prestige-app || true
            docker rm prestige-app || true
            docker pull aleksander75/prestige-app:latest
            docker run -d \
              --name prestige-app \
              -p 80:5000 \
              -v /var/lib/prestige/instance:/app/instance \
              --restart always \
              aleksander75/prestige-app:latest